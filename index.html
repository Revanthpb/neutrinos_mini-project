<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mini Wikipedia</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f8f9fa;
      margin: 0;
    }

    header {
      background: white;
      border-bottom: 1px solid #ccc;
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    /* HERO */
    .hero {
      background: #0b1622;
      color: white;
      text-align: center;
      padding: 60px 20px;
    }

    .hero-title {
      font-size: 42px;
      font-family: Georgia, serif;
    }

    .hero-subtitle {
      color: #ccc;
      margin-bottom: 25px;
    }

    .languages {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      max-width: 650px;
      margin: 0 auto 25px;
    }

    .languages span {
      display: block;
      font-size: 12px;
      color: #aaa;
    }

    .search-box {
      display: flex;
      justify-content: center;
    }

    .search-box input {
      padding: 10px;
      width: 250px;
    }

    .search-box button {
      padding: 10px;
      background: #3366cc;
      color: white;
      border: none;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* SEARCH RESULTS */
    #searchResults {
      margin: 20px 0;
    }

    .image-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .image-card {
      width: 300px;
      background: white;
      padding: 10px;
      text-align: center;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .image-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .categories {
      text-align: center;
      margin-top: 30px;
    }

    .category-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .category-card {
      width: 280px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .user-sections {
      margin-top: 40px;
      text-align: center;
    }

    .user-section-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
    }
.image-card {
  text-decoration: none;
  color: inherit;
  display: block;
}
    .section {
      width: 280px;
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .edit-btn { background: #ffc107; }
    .delete-btn { background: red; color: white; }

    footer {
      margin-top: 40px;
      text-align: center;
      padding: 10px;
      border-top: 1px solid #ccc;
    }

    /* POPUP */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .lang-card {
  text-decoration: none;
  color: #4da3ff;
  font-weight: bold;
  display: block;
  padding: 10px;
  border-radius: 8px;
  transition: 0.3s;
}

.lang-card:hover {
  background: rgba(255,255,255,0.1);
  transform: scale(1.05);
}

.lang-card span {
  display: block;
  font-size: 12px;
  color: #aaa;
  margin-top: 5px;
}
    .section-title {
  text-align: center;
  margin: 30px 0 20px;
  font-size: 26px;
  font-weight: bold;
}
    .hidden { display: none; }

    .popup-content {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 300px;
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">
    <h1>Wikipedia</h1>
    <button id="addSectionBtn">+ Add Section</button>
  </div>
</header>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <h2>Add Section</h2>
    <input id="titleInput" placeholder="Title">
    <textarea id="descInput" placeholder="Description"></textarea>
    <button id="saveBtn">Save</button>
    <button id="closeBtn">Cancel</button>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <h1 class="hero-title">Wikipedia</h1>
  <p class="hero-subtitle">The free encyclopedia</p>

  <div class="languages">

  <a href="https://en.wikipedia.org" target="_blank" class="lang-card">
    English
    <span>7M+ articles</span>
  </a>

  <a href="https://es.wikipedia.org" target="_blank" class="lang-card">
    Español
    <span>2M+ artículos</span>
  </a>

  <a href="https://fr.wikipedia.org" target="_blank" class="lang-card">
    Français
    <span>2.7M+ articles</span>
  </a>

</div>

  <div class="search-box">
    <input type="text" placeholder="Search Wikipedia..." />
    <button>🔍</button>
  </div>
</section>

<div class="container">

  <!-- 🔍 SEARCH RESULTS -->
  <div id="searchResults"></div>

  <!-- IMAGES -->
   <div class="container">

  <h2 class="section-title">Categories</h2>

  <div class="image-container">

    <a href="https://en.wikipedia.org/wiki/Sport" target="_blank" class="image-card">
      <img src="https://picsum.photos/300/180?1">
      <p>Sports</p>
    </a>

    <a href="https://en.wikipedia.org/wiki/Politics" target="_blank" class="image-card">
      <img src="https://picsum.photos/300/180?2">
      <p>Politics</p>
    </a>

    <a href="https://en.wikipedia.org/wiki/Science" target="_blank" class="image-card">
      <img src="https://picsum.photos/300/180?3">
      <p>Science</p>
    </a>

  </div>

</div>

  <!-- USER SECTIONS -->
  <div class="user-sections">
    <h2>User Sections</h2>
    <div id="sections" class="user-section-container"></div>
  </div>

</div>

<footer>
  <p>Visit Wikipedia</p>
</footer>

<script type="module" src="/src/main.ts"></script>

</body>
</html>
